[bootstrap]
description = "Bootstrap configuration"
mirrors = "Lithuania,Latvia,Estonia,Poland,Russia"
packages = [
  { name = "git", description = "The fast distributed version control system" },
  { name = "reflector", description = "Script to retrieve and filter the latest Pacman mirror list" },
  { name = "base-devel", description = "Basic tools to build Arch Linux packages" },
]

[packages.niri_core]
description = "Niri compositor and core UI components"
packages = [
  { name = "niri", description = "A scrollable-tiling Wayland compositor" },
  { name = "alacritty", description = "A cross-platform, GPU-accelerated terminal emulator" },
  { name = "swayidle", description = "Idle management daemon for Wayland" },
  { name = "xwayland-satellite", description = "Xwayland outside your Wayland" },
  { name = "xdg-desktop-portal-gtk", description = "xdg-desktop-portal backend using GTK" },
  { name = "xdg-desktop-portal-gnome", description = "xdg-desktop-portal backend for GNOME" },
  { name = "ly", description = "TUI display manager" },
  { name = "quickshell", description = "Flexible toolkit for making desktop shells with QtQuick" },
  { name = "rofi", description = "Window switcher, application launcher and dmenu replacement" },
  { name = "wl-clipboard", description = "Command-line copy/paste utilities for Wayland" },
  { name = "mate-polkit", description = "PolicyKit integration for the MATE desktop" },
  { name = "noto-fonts", description = "Google Noto TTF fonts" },
  { name = "noto-fonts-cjk", description = "Google Noto CJK fonts" },
  { name = "noto-fonts-emoji", description = "Google Noto Color Emoji font" },
  { name = "inter-font", description = "A typeface specially designed for user interfaces" },
  { name = "ttf-jetbrains-mono-nerd", description = "Patched font JetBrains Mono from nerd fonts library" },
]

[packages.amd_video_drivers]
description = "AMD GPU drivers and Vulkan support"
packages = [
  { name = "libva-mesa-driver", description = "Open-source OpenGL drivers" },
  { name = "libva-utils", description = "Intel VA-API Media Applications and Scripts for libva" },
  { name = "lib32-vulkan-radeon", description = "Open-source Vulkan driver for AMD GPUs - 32-bit" },
  { name = "vulkan-mesa-layers", description = "Mesa's explicit Vulkan layers" },
  { name = "vulkan-radeon", description = "Open-source Vulkan driver for AMD GPUs" },
]

# Packages with a non-empty `version` field will be installed via `downgrade` after the main installation.
# This packages will be added to IgnorePkg in `/etc/pacman.conf`.
# The `version` value is passed directly to
# downgrade's version-filtering syntax, e.g.:
#   version = "=1.0.0-1"   -> downgrade 'pkg=1.0.0-1'
#   version = "=~^1.2"     -> downgrade 'pkg=~^1.2'
#   version = "<=2.0.0-1"  -> downgrade 'pkg<=2.0.0-1'
# Packages without `version` (or version = "") are installed normally via yay.

[packages.essential]
description = "Essential system and user packages"
packages = [
  { name = "adw-gtk-theme", description = "Unofficial GTK 3 port of the libadwaita theme" },
  { name = "bash-completion", description = "Programmable completion for the bash shell" },
  { name = "bat", description = "Cat clone with syntax highlighting and git integration" },
  { name = "btop", description = "A monitor of system resources, bpytop ported to C++" },
  { name = "code", description = "The Open Source build of Visual Studio Code editor" },
  { name = "wget", description = "Network utility to retrieve files from the web" },
  { name = "brightnessctl", description = "Lightweight brightness control tool" },
  { name = "playerctl", description = "Mpris media player controller" },
  { name = "dosfstools", description = "DOS filesystem utilities" },
  { name = "exfatprogs", description = "exFAT filesystem userspace utilities" },
  { name = "ffmpegthumbnailer", description = "Lightweight video thumbnailer" },
  { name = "firefox", description = "Fast, Private & Safe Web Browser" },
  { name = "flatpak", description = "Linux application sandboxing and distribution framework" },
  { name = "fwupd", description = "Simple daemon to allow session software to update firmware" },
  { name = "gvfs", description = "Virtual filesystem implementation for GIO" },
  { name = "gvfs-mtp", description = "Virtual filesystem implementation for GIO - MTP backend" },
  { name = "gst-plugins-bad", description = "Multimedia graph framework - bad plugins" },
  { name = "gst-plugins-base", description = "Multimedia graph framework - base plugins" },
  { name = "gst-plugins-ugly", description = "Multimedia graph framework - ugly plugins" },
  { name = "lazygit", description = "Simple terminal UI for git commands" },
  { name = "loupe", description = "A simple image viewer for GNOME" },
  { name = "papers", description = "Document viewer for PDF and other document formats" },
  { name = "less", description = "A terminal based program for viewing text files" },
  { name = "man", description = "A utility for reading man pages" },
  { name = "nautilus", description = "Default file manager for GNOME", version = "=~49" },
  { name = "ntfs-3g", description = "NTFS filesystem driver and utilities" },
  { name = "power-profiles-daemon", description = "Makes power profiles handling available over D-Bus" },
  { name = "pwgen", description = "Password generator for creating easily memorable passwords" },
  { name = "sbctl", description = "Secure Boot key manager" },
  { name = "tree", description = "A directory listing program displaying a depth indented list" },
  { name = "tealdeer", description = "A fast tldr client in Rust" },
  { name = "ufw", description = "Uncomplicated CLI tool for managing a netfilter firewall" },
  { name = "uv", description = "An extremely fast Python package installer written in Rust" },
  { name = "rustup", description = "The Rust toolchain installer" },
  { name = "gnome-disk-utility", description = "Disk Management Utility for GNOME" },
  { name = "baobab", description = "A graphical directory tree analyzer" },
  { name = "gamescope", description = "SteamOS session compositing window manager" },
  { name = "steam", description = "Valve's digital software delivery system" },
  { name = "zellij", description = "A terminal multiplexer" },
  { name = "cloc", description = "Count lines of code" },
  { name = "downgrade", description = "Bash script for downgrading packages" },
]

[packages.lazyvim_deps]
description = "LazyVim / Neovim dependencies"
packages = [
  { name = "curl", description = "Command line tool for transferring data with URLs" },
  { name = "fd", description = "Simple, fast and user-friendly alternative to find" },
  { name = "fzf", description = "Command-line fuzzy finder" },
  { name = "gcc", description = "The GNU Compiler Collection - C and C++ frontends" },
  { name = "luarocks", description = "Deployment and management system for Lua modules" },
  { name = "make", description = "GNU make utility to maintain groups of programs" },
  { name = "neovim", description = "Fork of Vim aiming to improve user experience, plugins, and GUIs" },
  { name = "ripgrep", description = "A search tool combining usability of ag with speed of grep" },
  { name = "unzip", description = "For extracting and viewing files in .zip archives" },
]

[packages.aur]
description = "AUR packages"
packages = [
  { name = "morewaita-icon-theme", description = "Expanded Adwaita-styled companion icon theme" },
  { name = "nautilus-open-any-terminal", description = "Context-menu entry for opening any terminal in Nautilus" },
  { name = "xdg-terminal-exec", description = "Proposed standard for launching desktop apps with Terminal=true" },
  { name = "code-marketplace", description = "Enable VSCode marketplace in Code OSS" },
  { name = "yt-dlp-git", description = "A youtube-dl fork with additional features (git)" },
]

[packages.flatpak]
description = "Flatpak packages from Flathub"
packages = [
  { name = "org.kde.okular", description = "Document Viewer", env = { QT_SCALE_FACTOR = "1.25" } },
  { name = "org.telegram.desktop", description = "Official Telegram Desktop client", fs = [
    "~/Downloads",
  ] },
  { name = "org.libreoffice.LibreOffice", description = "LibreOffice with new features and enhancements" },
  { name = "org.videolan.VLC", description = "Free and open source multimedia player", env = { QT_SCALE_FACTOR = "1.25" } },
  { name = "com.obsproject.Studio", description = "Free software for live streaming and recording", env = { QT_SCALE_FACTOR = "1.25" } },
]

[services]
enable = [
  "ufw.service",
  "power-profiles-daemon.service",
  "ly@tty2.service",
  "bluetooth.service",
  "systemd-resolved.service",
]
disable = ["remote-fs.target", "avahi-daemon.service", "getty@tty2.service"]
mask = ["remote-fs.target", "avahi-daemon.service"]

[ufw]
description = "Firewall port configuration"
allow = [
  { port = 53317, proto = "udp", description = "LocalSend - local file sharing (scan)" },
  { port = 53317, proto = "tcp", description = "LocalSend - local file sharing (transfer)" },
]

[secureboot]
description = "Files to sign for Secure Boot"
sign_targets = [
  "/boot/vmlinuz-linux",
  "/boot/EFI/systemd/systemd-bootx64.efi",
  "/boot/EFI/BOOT/BOOTX64.EFI",
]

[git]
description = "Git configuration settings"
# {email} and {name} will be replaced with user input
# {sign_key} will be replaced with ~/.ssh/github-sign.pub
# {allowed} will be replaced with ~/.ssh/allowed_signers
settings = [
  { key = "user.email", value = "{email}" },
  { key = "user.name", value = "{name}" },
  { key = "core.editor", value = "nvim" },
  { key = "init.defaultBranch", value = "main" },
  { key = "pull.rebase", value = "true" },
  { key = "commit.gpgsign", value = "true" },
  { key = "gpg.format", value = "ssh" },
  { key = "gpg.ssh.allowedSignersFile", value = "{allowed}" },
  { key = "user.signingkey", value = "{sign_key}" },
]

[gschemas]
description = "Config gschemas"
packages = [
  { schema = "com.github.stunkymonkey.nautilus-open-any-terminal", key = "terminal", value = "alacritty" },
  { schema = "org.gnome.desktop.privacy", key = "remember-recent-files", value = "false" },
  { schema = "org.gnome.desktop.privacy", key = "disable-camera", value = "true" },
  { schema = "org.gnome.desktop.privacy", key = "disable-microphone", value = "true" },
  { schema = "org.gnome.desktop.privacy", key = "disable-sound-output", value = "true" },
  { schema = "org.gnome.desktop.interface", key = "enable-animations", value = "false" },
  { schema = "org.gnome.desktop.interface", key = "icon-theme", value = "MoreWaita" },
  { schema = "org.gnome.desktop.interface", key = "gtk-theme", value = "adw-gtk3-dark" },
  { schema = "org.gnome.desktop.interface", key = "monospace-font-name", value = "JetBrainsMono Nerd Font 12" },
  { schema = "org.gnome.desktop.interface", key = "font-name", value = "Inter 12" },
  { schema = "org.gnome.desktop.interface", key = "text-scaling-factor", value = "1.25" },
  { schema = "org.gnome.desktop.interface", key = "document-font-name", value = "Inter 12" },
  { schema = "org.gnome.desktop.interface", key = "color-scheme", value = "prefer-dark" },
  { schema = "org.gnome.desktop.wm.preferences", key = "focus-mode", value = "sloppy" },
]
